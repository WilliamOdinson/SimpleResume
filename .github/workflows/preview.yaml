name: Build LaTeX and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          extra_system_packages: "inkscape poppler-utils"
          latexmk_shell_escape: true

      - name: Rename PDF to theme name
        run: mv main.pdf default.pdf

      - name: Install poppler
        run: sudo apt-get install -y poppler-utils

      - name: Export 600 PPI PNG preview
        run: pdftoppm -png -r 600 -singlefile default.pdf default

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resume
          path: |
            default.pdf
            default.png

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: resume

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            default.pdf
            default.png
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
